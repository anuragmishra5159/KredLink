name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python-scoring:
    name: Test Python Scoring Microservice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd scoring
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          cd scoring
          python -m unittest test_scoring.py

  build-and-lint-frontend:
    name: Build and Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install Dependencies
        run: |
          cd client
          npm ci

      - name: Run Lint
        run: |
          cd client
          npm run lint

      - name: Build Frontend
        run: |
          cd client
          npm run build

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          cd scoring
          pip install -r requirements.txt

      - name: Start Python Scoring Service
        run: |
          cd scoring
          python app.py &
          sleep 3

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Run Seed Script
        run: |
          cd server
          node seed.js
        env:
          MONGO_URI: mongodb://localhost:27017/kredlink
          SCORING_SERVICE_URL: http://localhost:5001

      - name: Run Backend Integration Tests
        run: |
          cd server
          node test_blackbox.js
        env:
          MONGO_URI: mongodb://localhost:27017/kredlink
          SCORING_SERVICE_URL: http://localhost:5001
